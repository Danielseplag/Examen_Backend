; Configuración personalizada de PHP
[PHP]
display_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; Límites
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300

; Zona horaria
date.timezone = America/Santiago

; Locales
default_charset = utf-8
