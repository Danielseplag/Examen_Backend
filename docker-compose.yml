version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: todo_camisetas_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - todo_network
    restart: unless-stopped

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: todo_camisetas_php
    volumes:
      - ./src:/var/www
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-rootpass}
      DB_NAME: ${DB_NAME:-todo_camisetas}
    networks:
      - todo_network
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: todo_camisetas_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-todo_camisetas}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rootpass}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - todo_network
    restart: unless-stopped

networks:
  todo_network:
    driver: bridge

volumes:
  mysql_data:
